<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Echo Fracture Prototype</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-phase="PLANNING">

  <div id="screenFlash"></div>

  <h1>Echo Fracture (Prototype)</h1>
  <h2 id="phaseIndicator">Phase: PLANNING</h2>

  <div class="status-row">
    <p>Player HP: <span id="playerHP">100</span></p>
    <p>Enemy HP: <span id="enemyHP">100</span></p>
    <p>Focus: <span id="focusValue">3 / 5</span></p>
    <p>Echo: <span id="echoValue">None</span></p>
  </div>

  <div id="battlefieldWrap">
    <div id="battlefield">
      <div class="side player-side">
        <div id="playerEntity" class="entity player-entity idle"></div>
        <div id="echoAura"></div>
        <p class="entity-label">Player</p>
      </div>

      <div id="battleCenterText"></div>

      <div class="side enemy-side">
        <div id="enemyEntity" class="entity enemy-entity idle"></div>
        <p class="entity-label">Enemy</p>
      </div>

      <div id="enemyProjectile"></div>
    </div>
  </div>

  <div id="game">
    <div id="floatingTextLayer"></div>

    <div id="planning">
      <h2>Choose 2 Actions</h2>
      <p id="planningFocus">Planning Focus: 3 available</p>

      <div class="selected-slots">
        <p>Action 1: <span id="slot1">—</span></p>
        <p>Action 2: <span id="slot2">—</span></p>
      </div>

      <div id="actionPanel"></div>
    </div>

    <div id="execution" style="display:none;">
      <h2 id="executionText">Execution</h2>
      <p id="playerPrompt">Press SPACE to attack</p>
      <canvas id="canvas" width="400" height="200"></canvas>
    </div>

    <div id="enemy" style="display:none;">
      <h2 id="enemyTelegraphText">Enemy Attack Incoming!</h2>
      <p id="enemyPrompt">Press SPACE to block</p>
      <canvas id="enemyCanvas" width="400" height="200"></canvas>
    </div>

    <div id="log"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
